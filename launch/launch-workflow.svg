<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Launch Story Workflow</title>
  <desc id="desc">The launch story explains the AI Agent Safety Toolkit workflow from issue triage to draft PR and human review.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .box { fill: #ffffff; stroke: #28394d; stroke-width: 2; }
      .tool { fill: #e8f4ff; stroke: #1f6098; stroke-width: 2; }
      .human { fill: #edf7ed; stroke: #2b7138; stroke-width: 2; }
      .warn { fill: #fff7e6; stroke: #9a6900; stroke-width: 2; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #17202a; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #17202a; text-anchor: middle; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #43566b; text-anchor: middle; }
      .arrow { stroke: #546579; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#546579"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="520"/>
  <text class="title" x="48" y="56">Launch Story: Three Checks Around AI Agent Work</text>
  <g transform="translate(70 110)">
    <rect class="box" x="0" y="0" width="180" height="86" rx="8"/>
    <text class="label" x="90" y="38">GitHub issue</text>
    <text class="small" x="90" y="62">candidate work</text>
    <path class="arrow" d="M190 43 H245"/>
    <rect class="tool" x="255" y="0" width="190" height="86" rx="8"/>
    <text class="label" x="350" y="36">BountyLens</text>
    <text class="small" x="350" y="62">should this be attempted?</text>
    <path class="arrow" d="M455 43 H510"/>
    <rect class="tool" x="520" y="0" width="220" height="86" rx="8"/>
    <text class="label" x="630" y="36">Testability Doctor</text>
    <text class="small" x="630" y="62">can this repo be tested?</text>
    <path class="arrow" d="M750 43 H805"/>
    <rect class="warn" x="815" y="0" width="190" height="86" rx="8"/>
    <text class="label" x="910" y="36">AI agent</text>
    <text class="small" x="910" y="62">scoped changes</text>
  </g>
  <g transform="translate(180 290)">
    <rect class="box" x="0" y="0" width="150" height="82" rx="8"/>
    <text class="label" x="75" y="48">Tests</text>
    <path class="arrow" d="M160 41 H215"/>
    <rect class="tool" x="225" y="0" width="170" height="82" rx="8"/>
    <text class="label" x="310" y="48">AgentGate</text>
    <path class="arrow" d="M405 41 H460"/>
    <rect class="box" x="470" y="0" width="150" height="82" rx="8"/>
    <text class="label" x="545" y="48">Draft PR</text>
    <path class="arrow" d="M630 41 H685"/>
    <rect class="human" x="695" y="0" width="170" height="82" rx="8"/>
    <text class="label" x="780" y="35">Human</text>
    <text class="label" x="780" y="60">review</text>
  </g>
  <text class="small" x="560" y="455">No auto-claim, no payment/KYC, no cookie/token/keychain access, no spam PRs.</text>
</svg>
