<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Toolchain Overview</title>
  <desc id="desc">Three safety tools positioned before work, before editing, and before PR.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .stage { fill: #ffffff; stroke: #26384d; stroke-width: 2; rx: 8; }
      .tool { fill: #e8f4ff; stroke: #1d5f99; stroke-width: 2; rx: 8; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #17202a; }
      .stageLabel { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #43566b; text-anchor: middle; }
      .toolLabel { font-family: Arial, Helvetica, sans-serif; font-size: 26px; font-weight: 700; fill: #17202a; text-anchor: middle; }
      .copy { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #43566b; text-anchor: middle; }
      .arrow { stroke: #546579; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#546579"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="960" height="420"/>
  <text class="title" x="48" y="54">Toolchain Overview</text>
  <g transform="translate(70 115)">
    <rect class="stage" x="0" y="0" width="240" height="230" rx="8"/>
    <text class="stageLabel" x="120" y="42">Before work</text>
    <rect class="tool" x="35" y="78" width="170" height="78" rx="8"/>
    <text class="toolLabel" x="120" y="126">BountyLens</text>
    <text class="copy" x="120" y="185">Issue and bounty risk triage</text>
    <path class="arrow" d="M255 115 H315"/>
    <rect class="stage" x="330" y="0" width="240" height="230" rx="8"/>
    <text class="stageLabel" x="450" y="42">Before editing</text>
    <rect class="tool" x="365" y="78" width="170" height="78" rx="8"/>
    <text class="toolLabel" x="450" y="112">Testability</text>
    <text class="toolLabel" x="450" y="140">Doctor</text>
    <text class="copy" x="450" y="185">Repository testability preflight</text>
    <path class="arrow" d="M585 115 H645"/>
    <rect class="stage" x="660" y="0" width="240" height="230" rx="8"/>
    <text class="stageLabel" x="780" y="42">Before PR</text>
    <rect class="tool" x="695" y="78" width="170" height="78" rx="8"/>
    <text class="toolLabel" x="780" y="126">AgentGate</text>
    <text class="copy" x="780" y="185">AI-generated diff safety gate</text>
  </g>
</svg>
