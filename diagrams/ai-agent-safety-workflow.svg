<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent Safety Workflow</title>
  <desc id="desc">GitHub issue to BountyLens to Testability Doctor to AI coding agent to Tests to AgentGate to Draft PR to Human review.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .card { fill: #ffffff; stroke: #26384d; stroke-width: 2; rx: 8; }
      .gate { fill: #e8f4ff; stroke: #1d5f99; stroke-width: 2; rx: 8; }
      .agent { fill: #fff7e6; stroke: #966300; stroke-width: 2; rx: 8; }
      .review { fill: #edf7ed; stroke: #277135; stroke-width: 2; rx: 8; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #17202a; text-anchor: middle; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #43566b; text-anchor: middle; }
      .arrow { stroke: #546579; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .heading { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #17202a; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#546579"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1280" height="360"/>
  <text class="heading" x="48" y="52">AI Agent Safety Workflow</text>
  <g transform="translate(40 110)">
    <rect class="card" x="0" y="0" width="130" height="90" rx="8"/>
    <text class="label" x="65" y="38">GitHub</text>
    <text class="label" x="65" y="64">issue</text>
    <path class="arrow" d="M140 45 H185"/>
    <rect class="gate" x="195" y="0" width="130" height="90" rx="8"/>
    <text class="label" x="260" y="38">Bounty</text>
    <text class="label" x="260" y="64">Lens</text>
    <text class="small" x="260" y="112">before work</text>
    <path class="arrow" d="M335 45 H380"/>
    <rect class="gate" x="390" y="0" width="150" height="90" rx="8"/>
    <text class="label" x="465" y="36">Testability</text>
    <text class="label" x="465" y="64">Doctor</text>
    <text class="small" x="465" y="112">before editing</text>
    <path class="arrow" d="M550 45 H595"/>
    <rect class="agent" x="605" y="0" width="145" height="90" rx="8"/>
    <text class="label" x="677.5" y="36">AI coding</text>
    <text class="label" x="677.5" y="64">agent</text>
    <path class="arrow" d="M760 45 H805"/>
    <rect class="card" x="815" y="0" width="110" height="90" rx="8"/>
    <text class="label" x="870" y="52">Tests</text>
    <path class="arrow" d="M935 45 H980"/>
    <rect class="gate" x="990" y="0" width="130" height="90" rx="8"/>
    <text class="label" x="1055" y="52">AgentGate</text>
    <text class="small" x="1055" y="112">before PR</text>
    <path class="arrow" d="M1130 45 H1175"/>
  </g>
  <g transform="translate(1010 238)">
    <rect class="card" x="0" y="0" width="115" height="78" rx="8"/>
    <text class="label" x="57.5" y="46">Draft PR</text>
    <path class="arrow" d="M125 39 H170"/>
    <rect class="review" x="180" y="0" width="150" height="78" rx="8"/>
    <text class="label" x="255" y="36">Human</text>
    <text class="label" x="255" y="61">review</text>
  </g>
  <path class="arrow" d="M1160 155 C1220 155 1225 250 1180 277"/>
</svg>
